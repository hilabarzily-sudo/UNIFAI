<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="balloonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8B4B4" />
      <stop offset="50%" stop-color="#FAD5C5" />
      <stop offset="100%" stop-color="#A8C5DA" />
    </linearGradient>
    <radialGradient id="highlight" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Main balloon -->
  <ellipse cx="50" cy="50" rx="35" ry="45" fill="url(#balloonGrad)" />
  
  <!-- Highlight -->
  <ellipse cx="35" cy="35" rx="15" ry="20" fill="url(#highlight)" />
  
  <!-- String -->
  <path d="M50 95 L48 115 L52 115 Z" fill="#A8C5DA" opacity="0.7" />
  
  <!-- Knot -->
  <circle cx="50" cy="95" r="3" fill="#A8C5DA" />
</svg>
